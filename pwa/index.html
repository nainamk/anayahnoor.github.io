<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlanetPal</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #cfd9df, #e2ebf0);
}

/* HEADER */
header {
    background: #1e2f44;
    color: white;
    text-align: center;
    padding: 20px;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

/* BUTTONS */
.nav-buttons {
    background: #ddd;
    text-align: center;
    padding: 15px;
}

.nav-buttons button {
    margin: 5px;
    padding: 10px 20px;
    border: none;
    background: #2c3e50;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.nav-buttons button:hover {
    background: #007acc;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: white;
    border-radius: 15px;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar li {
    padding: 12px;
    margin: 8px 0;
    background: #f3f3f3;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    transition: 0.3s;
}

.sidebar li:hover {
    background: #007acc;
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
}

.main img {
    width: 100%;
    max-width: 500px;
    border-radius: 15px;
    margin-bottom: 10px;
}

iframe {
    margin-top: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>🌍 PlanetPal</h1>
    <p>Learn about the Solar System</p>
</header>

<div class="nav-buttons">
    <button>Install App</button>
    <button>Promo Page</button>
    <button>Instructions</button>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Topics</h2>
        <ul>
            <li onclick="loadTopic('sun')">☀️ Sun</li>
            <li onclick="loadTopic('mercury')">Mercury</li>
            <li onclick="loadTopic('venus')">Venus</li>
            <li onclick="loadTopic('earth')">Earth</li>
            <li onclick="loadTopic('mars')">Mars</li>
            <li onclick="loadTopic('jupiter')">Jupiter</li>
            <li onclick="loadTopic('saturn')">Saturn</li>
            <li onclick="loadTopic('neptune')">Neptune</li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <h2 id="title">Welcome to PlanetPal</h2>

        <img id="image" src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Solar_sys8.jpg">

        <p id="description">Click a topic to learn about a planet.</p>

        <!-- VIDEO -->
        <iframe id="video"
            width="100%"
            height="315"
            src=""
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

</div>

<script>
function loadTopic(topic) {

    const data = {
        sun: {
            title: "The Sun ☀️",
            img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Solar_sys8.jpg",
            desc: "The Sun is the center of our solar system.",
            video: "https://www.youtube.com/embed/libKVRa01L8"
        },
        mercury: {
            title: "Mercury",
            img: "https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg",
            desc: "Mercury is the closest planet to the Sun.",
            video: "https://www.youtube.com/embed/0KBjnNuhRHs"
        },
        venus: {
            title: "Venus",
            img: "https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg",
            desc: "Venus is the hottest planet.",
            video: "https://www.youtube.com/embed/BvXa1n9fjow"
        },
        earth: {
            title: "Earth 🌍",
            img: "https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg",
            desc: "Earth supports life.",
            video: "https://www.youtube.com/embed/GOAEIMx39-w"
        },
        mars: {
            title: "Mars 🔴",
            img: "https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg",
            desc: "Mars is the red planet.",
            video: "https://www.youtube.com/embed/D8pnmwOXhoY"
        },
        jupiter: {
            title: "Jupiter",
            img: "https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg",
            desc: "Jupiter is the largest planet.",
            video: "https://www.youtube.com/embed/PtkqwslbLY8"
        },
        saturn: {
            title: "Saturn 🪐",
            img: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg",
            desc: "Saturn is famous for its rings.",
            video: "https://www.youtube.com/embed/epZdZaEQhS0"
        },
        neptune: {
            title: "Neptune",
            img: "https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg",
            desc: "Neptune has strong winds.",
            video: "https://www.youtube.com/embed/NStn7zZKXfE"
        }
    };

    document.getElementById("title").innerText = data[topic].title;
    document.getElementById("image").src = data[topic].img;
    document.getElementById("description").innerText = data[topic].desc;
    document.getElementById("video").src = data[topic].video;
}
</script>

</body>
</html>

</body>
</html>
